spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: none
  ai:
    openai:
      api-key: test-key
      chat:
        options:
          model: gpt-4o-mini

resilience4j:
  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 4
        minimum-number-of-calls: 2
        failure-rate-threshold: 50
